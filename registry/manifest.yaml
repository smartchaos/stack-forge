- name: superpowers
  description: "Workflow methodology (brainstorm, planning, TDD, review)"
  capabilities: [brainstorm, planning]
  priority: required
  install:
    type: claude_command
    command: "/plugin install superpowers@claude-plugins-official"

- name: feature-dev
  description: "Structured feature development with codebase exploration and architecture design"
  capabilities: [specification]
  priority: required
  install:
    type: claude_command
    command: "/plugin install feature-dev@claude-plugins-official"

- name: code-review
  description: "Multi-agent PR review with confidence-based scoring (GitHub PR only)"
  capabilities: [pr-review]
  priority: optional
  install:
    type: claude_command
    command: "/plugin install code-review@claude-plugins-official"

- name: gstack
  description: "Shipping skills (PR, merge, deploy)"
  capabilities: [release]
  priority: recommended
  install:
    type: git_clone
    command: "git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack && cd ~/.claude/skills/gstack && ./setup"

- name: claude-mem
  description: "Memory persistence across sessions"
  capabilities: [memory]
  priority: optional
  install:
    type: claude_command
    command: "/plugin install claude-mem@claude-plugins-official"
