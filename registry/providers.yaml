superpowers:
  capabilities: [brainstorm, planning]
  detect:
    - type: plugin_installed
      name: "superpowers"

feature-dev:
  capabilities: [specification]
  detect:
    - type: plugin_installed
      name: "feature-dev"

code-review:
  capabilities: [pr-review]
  detect:
    - type: plugin_installed
      name: "code-review"

gstack:
  capabilities: [release]
  detect:
    - type: slash_command
      command_name: "gstack"
    - type: skill_exists
      path: "~/.claude/skills/gstack/"

claude-mem:
  capabilities: [memory]
  detect:
    - type: mcp_server_configured
      name: "claude-mem"
